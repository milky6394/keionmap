<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マップアプリ - ホーム</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
      font-size: 24px;
      margin-bottom: 24px;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 16px; /* ボタン同士の間隔 */
    }
    .btn {
      display: block;
      padding: 16px 20px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.2s, transform 0.1s;
    }
    /* スマホでタップした時のポチッとした反応 */
    .btn:active {
      transform: scale(0.98);
      background-color: #2980b9;
    }
    /* ボタンごとの色チェンジ（お好みで） */
    .btn-map { background-color: #2ecc71; }
    .btn-info { background-color: #e67e22; }
    .btn-setting { background-color: #9b59b6; }
  </style>
</head>

<body>
  <div class="container">
    <h1>🗺️ メインメニュー</h1>
    <div class="button-group">
      <!-- それぞれのHTMLファイルへ遷移するボタン -->
      <a href="map.html" class="btn btn-map">🗺️ タップマップを開く</a>
      <a href="page2.html" class="btn btn-info">📜 建物一覧を見る</a>
      <a href="page3.html" class="btn btn-setting">ℹ️ このアプリについて</a>
    </div>
  </div>
</body>
</html>
