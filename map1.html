<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>タウンマップ</title>
  <!-- スマホの指操作（パン・ズーム）を快適にするライブラリ -->
  <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1a1a1a;
      color: #333;
      overflow: hidden; /* 余計なスクロールを禁止 */
      width: 100vw;
      height: 100vh;
    }

    /* ヘッダー */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .back-btn {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
    }

/* 全体表示領域 */
.viewport {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
  /* 💡 スマホの標準スクロールやダブルタップ拡大を無効化し、Panzoomに操作を委ねる */
  touch-action: none;
  background-color: #1a1a1a;
}

.map-stage {
  position: relative;
  aspect-ratio: 16 / 9; /* ご自身の画像の縦横比 */
  width: 100vw;
  max-width: 100%;
  margin: 0 auto;
  /* 💡 タッチ操作時の意図しないテキスト選択やハイライトを防止 */
  user-select: none;
  -webkit-user-select: none;
}
    /* 背景画像 */
    .map-image {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none; /* 画像へのタッチイベントを透過 */
    }

    /* SVGオーバーレイ（画像と寸分たがわず完全密着） */
    .map-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 当たり判定エリア */
    .building-area {
      fill: rgba(255, 255, 255, 1); /* タップに反応させるため極小の不透明度 */
      stroke: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* ハイライト表示 */
    .building-area.active {
      fill: rgba(241, 196, 15, 0.4);
      stroke: #f1c40f;
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px #f1c40f);
    }

    /* 説明シート */
    .info-sheet {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 20px 24px 32px 24px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
      transition: bottom 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
      z-index: 100;
    }
    .info-sheet.open { bottom: 0; }
    .info-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .info-title { font-size: 20px; font-weight: bold; margin: 0; color: #2c3e50; }
    .close-btn { background: #eee; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
    .info-desc { font-size: 14px; line-height: 1.6; color: #666; margin: 0; }
  </style>
</head>
<body>

  <div class="header">
    <span>🏰 ワールドマップ</span>
    <a href="index.html" class="back-btn">メニューへ</a>
  </div>

  <div class="viewport" id="viewport">
    <!-- 画像とSVGを入れる共通の箱（ここが一緒に移動・拡大縮小する） -->
    <div class="map-stage" id="mapStage">
      
      <!-- ① マップ画像 -->
      <img src="stage.png" alt="Map" class="map-image">

      <!-- ② SVG判定（viewBoxの数値はご自身の「画像サイズ（幅x高さ）」に合わせると座標打ちが楽になります） -->
      <!-- 例: 1920x1080の画像なら viewBox="0 0 1920 1080" -->
      <svg class="map-svg" viewBox="0 0 1280 720">
        <!-- 建物1 (座標例) -->
        <polygon class="building-area" data-id="castle" points="800,200 1100,200 1150,500 750,500" />
        <!-- 建物2 (座標例) -->
        <rect class="building-area" data-id="shop" x="200" y="600" width="300" height="250" rx="15" />
      </svg>

    </div>
  </div>

  <!-- 説明ポップアップ -->
  <div class="info-sheet" id="infoSheet">
    <div class="info-header">
      <h2 class="info-title" id="infoTitle">建物名</h2>
      <button class="close-btn" onclick="closeInfo()">✕</button>
    </div>
    <p class="info-desc" id="infoDesc">説明文がここに表示されます。</p>
  </div>

  <script>
const stage = document.getElementById('mapStage');
const viewport = document.getElementById('viewport');

// 💡 スマホのタッチ操作に最適化した Panzoom 設定
const panzoom = Panzoom(stage, {
  maxScale: 5,
  minScale: 0.5,
  contain: false,
  // 二本指でピンチ（拡大縮小）したとき、指の中央を軸にしてスムーズに拡大する設定
  pinchAndPan: true,
  canvas: true, // タッチ領域を安定させる設定
});

// 💡 「画面全体のどこを触っても」ドラッグ＆ピンチ移動できるようにイベントをバインド
viewport.addEventListener('pointerdown', (event) => {
  panzoom.handleDown(event);
});
viewport.addEventListener('pointermove', (event) => {
  panzoom.handleMove(event);
});
viewport.addEventListener('pointerup', (event) => {
  panzoom.handleUp(event);
});

// PCのマウスホイール操作用（カーソル位置を中心に拡大）
viewport.addEventListener('wheel', (event) => {
  panzoom.zoomWithWheel(event);
});
    // 建物の説明データ
    const buildingData = {
      castle: { title: "🏰 お城", desc: "王様がいる城エリアです。" },
      shop: { title: "🏪 道具屋", desc: "アイテムを購入できるショップです。" }
    };

    const infoSheet = document.getElementById('infoSheet');
    const infoTitle = document.getElementById('infoTitle');
    const infoDesc = document.getElementById('infoDesc');
    const areas = document.querySelectorAll('.building-area');

    areas.forEach(area => {
      // 指でドラッグした後の離した時と「タップ」を区別して反応させる
      area.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = area.getAttribute('data-id');
        const data = buildingData[id];

        if (data) {
          areas.forEach(a => a.classList.remove('active'));
          area.classList.add('active');
          infoTitle.textContent = data.title;
          infoDesc.textContent = data.desc;
          infoSheet.classList.add('open');
        }
      });
    });

    function closeInfo() {
      infoSheet.classList.remove('open');
      areas.forEach(a => a.classList.remove('active'));
    }

    document.getElementById('viewport').addEventListener('click', () => {
      closeInfo();
    });
  </script>
</body>
</html>
